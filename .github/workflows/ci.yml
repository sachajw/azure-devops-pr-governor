name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Download dependencies
        run: go mod download

      - name: Verify module
        run: go mod verify

      - name: Build
        run: go build -o governor .

      - name: Test
        run: go test ./... -v -count=1 -race

      - name: Vet
        run: go vet ./...
